# LaCOS Sunshine defaults. Seeded into ~/.config/sunshine/sunshine.conf on first
# boot, COPY-IF-ABSENT — if you edit that file, your version always wins.
#
# Per-box override without editing this file: set LAVA_SUNSHINE_ENCODER in
# /etc/lava-chicken/site.conf (or via the setup wizard); provisioning writes it
# into the seeded config.
#
# encoder — VAAPI is the AMD-Mesa hardware-encode path (see docs/APPS.md). It is
# also REQUIRED on Polaris / older AMD (RX 5xx): Sunshine's default auto-probe
# SIGSEGVs in the vulkan encoder probe (h264_vulkan "not supported by this
# device") and crash-loops until StartLimitBurst. Newer AMD cards may delete
# this line to let Sunshine auto-select.
encoder = vaapi
