# systemd-tmpfiles: dirs the nugget agent + sudo audit need, recreated each boot.
# Install to /usr/lib/tmpfiles.d/lava-chicken.conf (Bazzite, baked) or
# /etc/tmpfiles.d/lava-chicken.conf (SteamOS, written by provisioning).
# (Adopted from the parallel build; adapted to the nugget-tui naming.)

# Group-shared socket dir for the cross-user tmux server. setgid (2xxx) so the
# tmux socket inherits group nugget-tui automatically — this avoids a chgrp that
# would fail when run as the non-root nugget user. Owner nugget; group traverses.
d /run/nugget 2770 nugget nugget-tui -

# sudo I/O audit transcripts (root-only).
d /var/log/sudo-io        0700 root root -
d /var/log/sudo-io/nugget 0700 root root -

# reboot-safe killswitch flag lives here (dir only; file created on demand).
d /etc/lava-chicken 0755 root root -
