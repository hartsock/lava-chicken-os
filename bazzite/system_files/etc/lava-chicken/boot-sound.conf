# Boot-sound tuning (read by the greeter-time ALSA boot-sound service).
# We ship BOTH a boot chime (desktop boots) and a Steam startup movie (Game Mode).
# So skip the ALSA chime in Game Mode and let the movie carry the audio there —
# otherwise aplay grabs the exclusive PCM first and can clip the movie's opening.
LAVA_BOOTSOUND_GAMEMODE=0
# Pin an output if the default guesses wrong (e.g. avoids blasting an HDMI TV):
# LAVA_BOOTSOUND_CARD=plughw:1,0
