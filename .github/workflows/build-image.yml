name: build-image

# Builds the lava-chicken-os bootc image (Bazzite base) and pushes it to GHCR,
# then generates an Anaconda install ISO and a qcow2 VM disk as artifacts.
#
# Pattern follows the current uBlue image-template (checked 2026-07-11):
#   plain `podman build` -> docker/login-action -> `sudo -E podman push` -> cosign.
# The stale redhat-actions/buildah-build + push-to-registry actions were dropped.

on:
  pull_request:
    branches: [main] # PRs build + smoke-inspect (no publish) so merge-on-green gates
  push:
    branches: [main]
    paths:
      - "bazzite/**"
      - "common/**"
      - "assets/brand/**"
      - "VERSION"
      - ".github/workflows/build-image.yml"
  schedule:
    - cron: "0 6 * * 1" # weekly: pick up Bazzite base + package updates
  workflow_dispatch:
    inputs:
      github_user:
        description: "GitHub user whose public keys seed SSH access"
        required: false
        default: "hartsock"

env:
  IMAGE_NAME: lava-chicken-os
  # NOTE: GHCR requires a lowercase owner; every consumer lowercases at point of use.
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  # Repo variable LAVA_GITHUB_USER overrides; falls back to the dispatch input
  # or the repo owner. Forkers set one variable, edit nothing.
  DEFAULT_GH_USER: ${{ vars.LAVA_GITHUB_USER || github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    strategy:
      fail-fast: false # a deck-base breakage must not hide the stable result (and vice versa)
      matrix:
        include:
          # :stable — KDE desktop-first.  :deck — boot-to-Game-Mode (SteamOS UX). See #23.
          - variant: stable
            base: ghcr.io/ublue-os/bazzite:stable
          - variant: deck
            base: ghcr.io/ublue-os/bazzite-deck:stable
    runs-on: ubuntu-24.04 # podman v4+ / newer buildah; 22.04 ships podman v3 (too old)
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless (OIDC) signing
    steps:
      - uses: actions/checkout@v5

      # Bazzite layers are multi-GB; free the runner or the build can hit ENOSPC.
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # pinned

      - name: Sync shared payload into image build context
        run: |
          # common/ is the single source of truth; the image lands it under
          # /usr/share/lava-chicken. This synced dir is gitignored.
          mkdir -p bazzite/system_files/usr/share/lava-chicken
          rsync -a --delete common/ bazzite/system_files/usr/share/lava-chicken/
          cp VERSION bazzite/system_files/usr/share/lava-chicken/VERSION
          mkdir -p bazzite/system_files/usr/share/lava-chicken/brand
          cp assets/brand/* bazzite/system_files/usr/share/lava-chicken/brand/ 2>/dev/null || true

      - name: Resolve GitHub keys user + version
        id: cfg
        run: |
          user="${{ github.event.inputs.github_user || env.DEFAULT_GH_USER }}"
          echo "gh_user=$user" >>"$GITHUB_OUTPUT"
          echo "version=$(cat VERSION)" >>"$GITHUB_OUTPUT"
          echo "sha7=${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          echo "Seeding SSH keys from https://github.com/$user.keys ; version $(cat VERSION)"

      - name: Build image
        id: build
        run: |
          set -euxo pipefail
          sudo podman build \
            --pull=newer \
            --file bazzite/Containerfile \
            --build-arg "BASE_IMAGE=${{ matrix.base }}" \
            --build-arg "LAVA_VARIANT=${{ matrix.variant }}" \
            --build-arg "LAVA_GITHUB_USER=${{ steps.cfg.outputs.gh_user }}" \
            --build-arg "LAVA_BOX_NAME=${{ vars.LAVA_BOX_NAME || 'nugget' }}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.description=Lava Chicken OS (LaCOS) — custom Bazzite bootc image" \
            --label "org.opencontainers.image.title=${IMAGE_NAME}" \
            --tag "${IMAGE_NAME}:build" \
            ./bazzite

      # L1 smoke (#9): assert the baked "nugget layer" INSIDE the freshly-built
      # image before we ever push. Runs on every PR + push, ~1 min, no VM. This
      # is the cheap net that catches "the build silently stopped installing X".
      - name: Smoke-inspect the nugget layer
        run: |
          set -euo pipefail
          sudo podman run --rm --entrypoint /usr/bin/bash "${IMAGE_NAME}:build" -euo pipefail -c '
            fail=0
            need_f() { [ -f "$1" ] || { echo "MISSING file: $1"; fail=1; }; }
            need_x() { [ -x "$1" ] || { echo "MISSING exec: $1"; fail=1; }; }
            # branded entrypoints + per-user agent launcher
            need_x /usr/bin/lacos
            /usr/bin/lacos help 2>/dev/null | grep -q "^  upgrade " \
              || { echo "lacos is missing the upgrade command"; fail=1; }
            # wireless-VR (ALVR) firewall command + its helper must ship and run
            /usr/bin/lacos help 2>/dev/null | grep -q "^  vr " \
              || { echo "lacos is missing the vr command"; fail=1; }
            need_x /usr/share/lava-chicken/bin/lacos-vr
            /usr/bin/lacos vr help 2>/dev/null | grep -q "wireless VR" \
              || { echo "lacos vr help broken or helper missing"; fail=1; }
            need_x /usr/bin/nugget
            # nugget launcher wears the real mascot, not a stock icon (#40)
            need_f /usr/share/icons/hicolor/256x256/apps/nugget.png
            grep -q "^Icon=nugget" /usr/share/applications/nugget-agent.desktop \
              || { echo "nugget launcher not using the mascot icon"; fail=1; }
            # newt theme (reuse thesis): the whole brand ships + the launcher wires
            # it, so newt reskins with no recompile. newt silently falls back to its
            # own art on any missing/blank stem, so CI is the only net — check ALL
            # stems the launcher references, and that the shown ones kept truecolor
            # (newt greps for 8;2;; a regen without --colors full ships all-blank).
            NB=/usr/share/lava-chicken/newt-brand
            for s in ansi-10 ansi-20 ansi-40 ansi-full ansi-120 ansi-160 ascii-40; do
              need_f "$NB/nugget-$s.txt"
            done
            for s in braille-40 braille-24 braille-16; do   # plain-text logos (MOTD/logs/crawlers)
              need_f "$NB/nugget-$s.txt"
            done
            for s in ansi-20 ansi-40; do   # rendered in the inline header + splash
              grep -q "8;2;" "$NB/nugget-$s.txt" \
                || { echo "brand art $s lost truecolor (regen: make-brand.sh, --colors full)"; fail=1; }
            done
            need_f "$NB/brand.env"
            grep -qE "^export NEWT_BRAND_NAME=" "$NB/brand.env" \
              || { echo "brand.env does not set NEWT_BRAND_NAME"; fail=1; }
            grep -q "NEWT_BRAND_LOGO_DIR/brand.env" /usr/bin/nugget \
              || { echo "nugget launcher does not source the brand env"; fail=1; }
            need_x /usr/bin/nugget-agentctl
            # system units that must be baked in
            for u in lava-chicken-firstboot lava-chicken-boot-sound nugget-agent-tmux \
                     lava-chicken-models lava-chicken-apps; do
              need_f "/usr/lib/systemd/system/${u}.service"
            done
            # account seed + agent persona + branded payload
            need_f /usr/lib/sysusers.d/nugget.conf
            need_f /usr/share/lava-chicken/persona/nugget-persona.md
            # bundled newt skills (#19) must ship in the payload
            need_f /usr/share/lava-chicken/newt-skills/youtube-prep/SKILL.md
            need_f /usr/share/lava-chicken/newt-skills/video-edit/SKILL.md
            # kid skills: wireless VR + Minecraft modding
            need_f /usr/share/lava-chicken/newt-skills/vr-setup/SKILL.md
            need_f /usr/share/lava-chicken/newt-skills/modding/SKILL.md
            # seeded newt config must ship and point at the CHAT model, never the
            # embedding model (newt-agent#1116).
            need_f /usr/share/lava-chicken/newt/config.toml
            # check config VALUES only (comment lines name nomic-embed to explain
            # the bug and must not trip this). No single quotes: this whole block
            # is already inside bash -c "..." single quotes.
            newtcfg=$(grep -vE "^[[:space:]]*#" /usr/share/lava-chicken/newt/config.toml)
            printf "%s" "$newtcfg" | grep -q "qwen2.5-coder:7b" \
              || { echo "seeded newt config missing chat model qwen2.5-coder:7b"; fail=1; }
            printf "%s" "$newtcfg" | grep -q "nomic-embed" \
              && { echo "seeded newt config activates the embedding model (#1116)"; fail=1; } || true
            # ollama must be BAKED (#28) — v0.0.1 shipped none and the agent was DOA
            need_x /usr/bin/ollama
            need_f /usr/lib/systemd/system/ollama.service
            need_f /usr/lib/sysusers.d/ollama.conf
            grep -q "enable ollama.service" /usr/lib/systemd/system-preset/80-lava-chicken.preset \
              || { echo "ollama.service missing from preset"; fail=1; }
            # splash step must ship (#31) + the plymouth SCRIPT plugin our theme
            # needs (real hardware failed on its absence)
            need_x /usr/share/lava-chicken/provision/07-plymouth.sh
            need_f /usr/lib64/plymouth/script.so
            # never idle-suspend (#33): sleep path must be masked in the image
            [ "$(readlink /etc/systemd/system/suspend.target 2>/dev/null)" = /dev/null ] \
              || { echo "suspend.target not masked"; fail=1; }
            need_x /usr/share/lava-chicken/bin/lacos-setup
            need_x /usr/share/lava-chicken/bin/lacos-doctor
            # Sunshine encoder default must ship (Polaris needs vaapi; #45)
            need_f /usr/share/lava-chicken/sunshine/sunshine.conf
            grep -qE "^encoder[[:space:]]*=" /usr/share/lava-chicken/sunshine/sunshine.conf \
              || { echo "shipped sunshine.conf missing an encoder default"; fail=1; }
            need_x /usr/share/lava-chicken/bin/lacos-pull-models
            # doctor REQUIRED model set (what --fix pulls) must equal the puller
            # default, or doctor demands a model the puller never fetches — a --fix
            # loop that never clears. Same default string must live in both files.
            grep -q "qwen2.5-coder:7b nomic-embed-text" /usr/share/lava-chicken/bin/lacos-pull-models \
              && grep -q "qwen2.5-coder:7b nomic-embed-text" /usr/share/lava-chicken/bin/lacos-doctor \
              || { echo "doctor required-models default drifted from lacos-pull-models"; fail=1; }
            # original brand media that must ship in the image
            need_f /usr/share/lava-chicken/brand/boot-sound.wav
            need_f /usr/share/lava-chicken/brand/wallpaper.png
            need_f /usr/share/lava-chicken/brand/lava_chicken_os_login.png
            # where plasma-login-manager exists (desktop), its default wallpaper
            # must be our login art (#50). deck/base without it: skipped.
            if [ -f /usr/lib/plasmalogin/defaults.conf ]; then
              grep -q "lava_chicken_os_login.png" /usr/lib/plasmalogin/defaults.conf \
                || { echo "plasma-login default background not wired to LaCOS art"; fail=1; }
            fi
            need_f /usr/share/plymouth/themes/lava-chicken/lava-chicken.plymouth
            # firstboot + sshd must be statically enabled (they run day zero)
            for u in lava-chicken-firstboot sshd; do
              state=$(systemctl is-enabled "${u}.service" 2>/dev/null || true)
              case "$state" in enabled|enabled-runtime|static|alias) ;;
                *) echo "NOT enabled: ${u} (is-enabled=${state:-none})"; fail=1;; esac
            done
            # LaCOS rebrand landed in os-release
            grep -q "Lava Chicken OS" /usr/lib/os-release || { echo "os-release not rebranded"; fail=1; }
            # variant marker must match the matrix leg that built this image
            v=$(cat /usr/share/lava-chicken/variant 2>/dev/null || echo missing)
            [ "$v" = "${{ matrix.variant }}" ] || { echo "variant marker $v != expected ${{ matrix.variant }}"; fail=1; }
            [ "$fail" = 0 ] && echo "nugget layer OK" || { echo "SMOKE FAILED"; exit 1; }
          '

      # #53: on hardware day both kids landed in `wheel` (the KDE Users panel
      # re-added them after 30-users removed them), and 45 then cascaded that
      # into nugget-tui (resident-agent access). Prove, in a throwaway root
      # container, that the REAL enrollment logic refuses to promote a kid — and
      # that `lacos doctor` DETECTS a kid wrongly left in wheel. (--fix isn't run
      # here: its other remedies are networked/firstboot; the kid-revoke remedy
      # itself is a trivial two-line `gpasswd -d`, exercised on real hardware.)
      - name: Guard — kid privileges (#53) + user-owned ~/.steam (#55)
        run: |
          set -euo pipefail
          sudo podman run --rm --entrypoint /usr/bin/bash "${IMAGE_NAME}:build" -euo pipefail -c '
            fail=0
            install -d /var/home   # image populates it at boot; useradd -m needs it to exist now
            useradd -M -s /usr/sbin/nologin adminci
            useradd -M -s /usr/sbin/nologin kidci
            useradd -m -d /var/home/steamci -s /usr/sbin/nologin steamci   # real home: the movie/steam/newt blocks run for it (#55/#1116)
            gpasswd -a adminci wheel >/dev/null
            gpasswd -a kidci   wheel >/dev/null   # the exact #53 misconfig: a kid in wheel
            # Run the REAL enrollment (top of 45). It must exclude+self-heal the kid
            # while still enrolling the genuine admin. Timeout-bound: 45 later touches
            # systemctl, which no-ops fast in a container; the enrollment runs first.
            timeout 120 env LAVA_KID_USERS=kidci \
              bash /usr/share/lava-chicken/provision/45-nugget-tmux.sh >/tmp/45.log 2>&1 || true
            member() { getent group "$2" | cut -d: -f4 | tr "," "\n" | grep -qx "$1"; }
            member kidci   nugget-tui && { echo "BUG: kid enrolled in nugget-tui (guard broken)"; fail=1; }
            member adminci nugget-tui || { echo "BUG: admin NOT enrolled (guard too broad)"; fail=1; }
            # lacos doctor (no --fix, no remedies) must FLAG the kid still in wheel.
            install -d /etc/lava-chicken
            echo "LAVA_KID_USERS=kidci" > /etc/lava-chicken/site.conf
            # doctor exits non-zero whenever it reports any FAIL (always, in this
            # bare container) — that is expected; we only care about its OUTPUT, so
            # never let its exit status trip `set -e`.
            /usr/share/lava-chicken/bin/lacos-doctor >/tmp/doctor.log 2>&1 || true
            grep -Eq "FAIL kid .kidci. is in wheel" /tmp/doctor.log \
              || { echo "BUG: doctor did not flag kid-in-wheel"; fail=1; }
            # #55: 45 must leave a provisioned user OWNING ~/.steam, with root a
            # SYMLINK (not a root-owned real dir that blocks Steam from starting).
            SH="$(getent passwd steamci | cut -d: -f6)"
            [ "$(stat -c %U "$SH/.steam" 2>/dev/null)" = steamci ] \
              || { echo "BUG(#55): $SH/.steam not owned by steamci (install -d parent-chown regression)"; fail=1; }
            [ -L "$SH/.steam/root" ] \
              || { echo "BUG(#55): $SH/.steam/root is not a symlink (shadows Steam)"; fail=1; }
            # #1116: 45 must seed ~/.newt/config.toml at the CHAT model, and leave
            # ~/.newt user-owned (the parent-chown bug that broke newt first-run).
            [ "$(stat -c %U "$SH/.newt" 2>/dev/null)" = steamci ] \
              || { echo "BUG: $SH/.newt not owned by steamci (install -d parent-chown)"; fail=1; }
            grep -q "qwen2.5-coder:7b" "$SH/.newt/config.toml" 2>/dev/null \
              || { echo "BUG(#1116): steamci ~/.newt/config.toml not seeded with the chat model"; fail=1; }
            # doctor must DETECT a root-owned ~/.steam — fabricate the old-bug state.
            chown root "$SH/.steam" 2>/dev/null || true
            /usr/share/lava-chicken/bin/lacos-doctor >/tmp/doctor2.log 2>&1 || true
            grep -Eq "steamci.* is owned by .root." /tmp/doctor2.log \
              || { echo "BUG: doctor did not flag root-owned ~/.steam"; fail=1; }
            if [ "$fail" = 0 ]; then echo "kid-privilege + ~/.steam guard OK"; else
              echo "===== 45 log ====="; cat /tmp/45.log
              echo "===== doctor log ====="; cat /tmp/doctor.log
              echo "===== doctor2 (steam) log ====="; cat /tmp/doctor2.log 2>/dev/null
              echo "===== steam state ====="; ls -la "$SH/.steam" 2>/dev/null; stat -c "%U %n" "$SH/.steam" 2>/dev/null
              echo "===== groups ====="; getent group wheel nugget-tui
              echo "GUARD FAILED"; exit 1; fi
          '

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request'
        run: |
          set -euxo pipefail
          REG="${IMAGE_REGISTRY@L}"          # force-lowercase owner (GHCR requirement)
          DEST="${REG}/${IMAGE_NAME}"
          # :stable carries the canonical version/sha tags; :deck gets its own set.
          if [ "${{ matrix.variant }}" = stable ]; then
            TAGS="stable v${{ steps.cfg.outputs.version }} ${{ steps.cfg.outputs.sha7 }}"
          else
            TAGS="deck deck-v${{ steps.cfg.outputs.version }}"
          fi
          for tag in $TAGS; do
            sudo podman tag "${IMAGE_NAME}:build" "${DEST}:${tag}"
            # sudo -E preserves $HOME so podman finds the docker/login-action auth.
            sudo -E podman push --digestfile=/tmp/digestfile "${DEST}:${tag}"
          done
          echo "digest=$(< /tmp/digestfile)" >>"$GITHUB_OUTPUT"
          echo "dest=${DEST}" >>"$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.3"

      # Keyless / OIDC signing — no COSIGN key secret needed; id-token:write enables it.
      # Consumers verify with:
      #   cosign verify ghcr.io/<owner>/lava-chicken-os:stable \
      #     --certificate-identity-regexp 'https://github.com/<owner>/lava-chicken-os/.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign image (cosign keyless)
        if: github.event_name != 'pull_request'
        run: |
          set -euxo pipefail
          cosign sign -y "${{ steps.push.outputs.dest }}@${{ steps.push.outputs.digest }}"

  # Single stable-named required check for branch protection: matrix legs report
  # as "build-image (stable)" / "build-image (deck)", which would silently break a
  # protection rule pinned to "build-image". This gate ALWAYS runs and fails
  # unless every matrix leg succeeded (a skipped required check would otherwise
  # count as satisfied — GitHub's documented behavior).
  image-gate:
    needs: build-image
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: All image variants built?
        run: |
          [ "${{ needs.build-image.result }}" = "success" ] \
            || { echo "FAIL: build-image matrix result = ${{ needs.build-image.result }}"; exit 1; }
          echo "all variants green"

  build-iso:
    needs: image-gate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read # pull the just-pushed (private-by-default) GHCR image
    steps:
      - uses: actions/checkout@v5

      # bootc-image-builder needs ~20-30 GB for a Bazzite ISO. Reclaim first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main @ pinned
        with:
          tool-cache: true
          docker-images: true
          large-packages: true

      - name: Pull the image into container storage (bib reads it locally)
        run: |
          set -euxo pipefail
          # podman on ubuntu-24.04 already defaults to overlay with a proper
          # runroot/graphroot — don't write a partial storage.conf (it clobbers
          # runroot -> "runroot must be set").
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo podman pull "${IMAGE_REGISTRY@L}/${IMAGE_NAME}:stable"

      - name: Build Anaconda install ISO
        run: |
          set -euxo pipefail
          REG="${IMAGE_REGISTRY@L}"
          mkdir -p ./output
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "$(pwd)/bazzite/image.toml":/config.toml:ro \
            -v "$(pwd)/output":/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type anaconda-iso \
            --rootfs btrfs \
            --config /config.toml \
            "${REG}/${IMAGE_NAME}:stable"

      - name: Fix output ownership (bib writes as root)
        run: sudo chown -R "$(id -u):$(id -g)" ./output

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: lava-chicken-os-installer
          path: ./output/**/*.iso
          if-no-files-found: error

  # A qcow2 VM disk for RISK-FREE testing — boot it in a VM before touching real
  # hardware (esp. before any dual-boot partition surgery). See docs/INSTALL-DUALBOOT.md.
  build-vm:
    needs: image-gate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main @ pinned
        with:
          tool-cache: true
          docker-images: true
          large-packages: true

      - name: Pull the image into container storage (bib reads it locally)
        run: |
          set -euxo pipefail
          # podman on ubuntu-24.04 already defaults to overlay with a proper
          # runroot/graphroot — don't write a partial storage.conf (it clobbers
          # runroot -> "runroot must be set").
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo podman pull "${IMAGE_REGISTRY@L}/${IMAGE_NAME}:stable"

      - name: Build qcow2 VM disk
        run: |
          set -euxo pipefail
          REG="${IMAGE_REGISTRY@L}"
          mkdir -p ./output
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "$(pwd)/bazzite/image.toml":/config.toml:ro \
            -v "$(pwd)/output":/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type qcow2 \
            --rootfs btrfs \
            --config /config.toml \
            "${REG}/${IMAGE_NAME}:stable"

      - name: Fix output ownership (bib writes as root)
        run: sudo chown -R "$(id -u):$(id -g)" ./output

      - name: Upload qcow2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: lava-chicken-os-vm
          path: ./output/**/*.qcow2
          if-no-files-found: error
